services:
  postgres:
    image: postgres:15-alpine
    container_name: 3dencasa_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: 3dencasa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: